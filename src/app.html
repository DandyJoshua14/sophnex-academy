<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		
		<!-- Favicon and App Icons -->
		<link rel="icon" type="image/png" href="/SOPHNEX%20ACADEMY%20LOGO-12.png" />
		<link rel="shortcut icon" type="image/png" href="/SOPHNEX%20ACADEMY%20LOGO-12.png" />
		<link rel="apple-touch-icon" href="/SOPHNEX%20ACADEMY%20LOGO-12.png" />
		
		<!-- SEO Meta Tags -->
		<meta name="description" content="Join SophNex Academy for comprehensive programming courses. Learn Python, JavaScript, and HTML/CSS from industry experts with hands-on projects and real-world applications." />
		<meta name="keywords" content="programming courses, Python programming, JavaScript programming, HTML CSS course, coding bootcamp, web development, software development, learn to code, programming education, Nigeria coding school, online programming courses, tech education Nigeria" />
		<meta name="author" content="SophNex Academy" />
		<meta name="robots" content="index, follow" />
		<meta name="googlebot" content="index, follow" />
		
		<!-- Open Graph Meta Tags -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="SophNex Academy" />
		<meta property="og:locale" content="en_US" />
		<meta property="og:image" content="https://sophnexacademy.com.ng/SOPHNEX%20ACADEMY%20LOGO-12.png" />
		
		<!-- Twitter Card Meta Tags -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:site" content="@sophnexacademy" />
		
		<!-- Mobile and App Meta Tags -->
		<meta name="format-detection" content="telephone=no" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="SophNex Academy" />
		<meta name="application-name" content="SophNex Academy" />
		
		<!-- Language and Region -->
		<meta name="language" content="en" />
		<meta name="geo.region" content="NG" />
		<meta name="geo.country" content="Nigeria" />
		
		<!-- Content Rating -->
		<meta name="rating" content="general" />
		<meta name="distribution" content="global" />
		
		<!-- Theme Colors -->
		<meta name="theme-color" content="#3469B2" />
		<meta name="msapplication-TileColor" content="#3469B2" />
		
		<!-- Performance Hints -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link rel="preconnect" href="https://www.google-analytics.com" />
		<link rel="dns-prefetch" href="//fonts.googleapis.com" />
		<link rel="dns-prefetch" href="//www.google-analytics.com" />
		<link rel="dns-prefetch" href="//www.googletagmanager.com" />
		
		<!-- Web App Manifest -->
		<link rel="manifest" href="/site.webmanifest" />
		
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
